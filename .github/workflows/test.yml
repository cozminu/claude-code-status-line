name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: DEBUG shellcheck
        run: |
          shellcheck --version
          shellcheck statusline-command.sh
          echo "exit: $?"
        continue-on-error: true
      - run: ./run-tests.sh
